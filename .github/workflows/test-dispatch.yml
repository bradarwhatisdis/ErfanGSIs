name: Test Manual Trigger

on:
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input field'
        required: false
        default: 'test'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test step
        run: |
          echo "Manual trigger works!"
          echo "Input: ${{ github.event.inputs.test_input }}"
          echo "Branch: ${{ github.ref }}"
